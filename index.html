<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDS Workshop | Moulvibazar Debating Society</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(fn) { originalFetch = fn; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {}

        window.addEventListener('error', function(event) {
          if (event.message && (event.message.indexOf('fetch') !== -1 || event.message.indexOf('getter') !== -1)) {
            event.preventDefault();
            return true;
          }
        });
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && (event.reason.message.indexOf('fetch') !== -1 || event.reason.message.indexOf('getter') !== -1)) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
